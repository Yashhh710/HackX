<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Centered Image</title>
    <style>
        body, html {
            height: 100%;
            margin: 0;
            display: flex;
            justify-content: center; 
            align-items: center;     
            background-color: #ffffff;

            max-width: 90%; 
            max-height: 90vh; 
            border-radius: 8px; 
        }
    </style>
</head>
<body>
