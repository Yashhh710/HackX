<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vault | HackX</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Open+Sans:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ffde03;
            --secondary: #03a9f4; 
            --accent: #ff5252;
            --gold: #ffac33;
            --purple: #a335ee;
            --black: #1a1a1a;
            --white: #ffffff;
            --border: 4px solid var(--black);
            --shadow: 8px 8px 0px var(--black);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-image: radial-gradient(var(--black) 15%, transparent 16%);
            background-size: 20px 20px;
            background-color: #f0f0f0;
            font-family: 'Open Sans', sans-serif;
            color: var(--black);
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
            padding: 40px 20px;
            background: var(--accent);
            border: var(--border);
            box-shadow: var(--shadow);
            transform: rotate(-1deg);
            position: relative; 
        }

        .back-btn {
            position: absolute;
            top: 15px;
            left: 15px;
            background: var(--white);
            color: var(--black);
            text-decoration: none;
            font-family: 'Bangers', cursive;
            padding: 8px 15px;
            border: 3px solid var(--black);
            box-shadow: 4px 4px 0px var(--black);
            font-size: 1.2rem;
            transition: 0.1s;
            transform: rotate
        }

        .back-btn:hover {
            background: var(--primary);
            transform: scale(1.1) rotate(0deg);
        }

        .back-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 0px 0px 0px var(--black);
        }

        .logo {
            font-family: 'Bangers', cursive;
            font-size: clamp(3rem, 10vw, 6rem);
            text-transform: uppercase;
            letter-spacing: 4px;
            color: var(--white);
            -webkit-text-stroke: 2px var(--black);
            text-shadow: 6px 6px 0px var(--primary);
        }

        .vault-grid {
            max-width: 1100px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 40px;
        }

        .loot-card {
            background: var(--white);
            border: var(--border);
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            transition: all 0.2s ease;
            position: relative;
        }

        .loot-card:hover {
            transform: translate(-4px, -4px);
            box-shadow: 12px 12px 0px var(--black);
        }

        .image-wrapper {
            height: 250px;
            border-bottom: var(--border);
            position: relative;
            overflow: hidden;
            background-color: #ddd;
        }

        .image-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .rarity-tag {
            position: absolute;
            top: -10px;
            right: 10px;
            color: white;
            padding: 5px 15px;
            font-family: 'Bangers', cursive;
            font-size: 1.5rem;
            border: 3px solid var(--black);
            transform: rotate(5deg);
            z-index: 2;
            text-shadow: 2px 2px 0px var(--black);
        }

        .gold-tag { background: var(--gold); }
        .purple-tag { background: var(--purple); }
        .blue-tag { background: var(--secondary); }

        .content {
            padding: 25px;
            background: var(--white);
        }

        .item-type {
            font-weight: 800;
            font-size: 0.85rem;
            text-transform: uppercase;
            color: #777;
            display: block;
            margin-bottom: 5px;
        }

        h2 {
            font-family: 'Bangers', cursive;
            font-size: 2.5rem;
            line-height: 1;
            margin-bottom: 15px;
            color: var(--black);
        }

        .stats-box {
            background: #f0f0f0;
            border: 2px dashed var(--black);
            padding: 10px;
            margin-bottom: 20px;
            font-weight: 700;
            font-size: 0.9rem;
        }

        .btn {
            display: block;
            text-align: center;
            padding: 15px 25px;
            background: var(--primary);
            color: var(--black);
            text-decoration: none;
            font-family: 'Bangers', cursive;
            font-size: 1.5rem;
            border: 3px solid var(--black);
            box-shadow: 4px 4px 0px var(--black);
            transition: 0.1s;
        }

        .btn:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px var(--black);
        }

        .btn:hover {
            background: var(--white);
        }

        footer {
            text-align: center;
            margin-top: 60px;
            padding: 30px;
            font-family: 'Bangers', cursive;
            font-size: 1.8rem;
            background: var(--black);
            color: var(--white);
        }
    </style>
</head>
<body>

    <header>
        <a id="backBtn" class="back-btn">EXIT VAULT</a>
        
        <h1 class="logo">LOOT VAULT</h1>
        <p style="font-weight: 800; letter-spacing: 2px; color: var(--black);">EQUIP YOUR HERO — SELECT YOUR GEAR</p>
    </header>

    <main class="vault-grid">
        <article class="loot-card">
            <span class="rarity-tag gold-tag">MYTHIC</span>
            <div class="image-wrapper">
                <img src="https://i.pinimg.com/736x/c7/bd/60/c7bd60dc745936d481d6b3c158922a03.jpg" alt="Golden Sword">
            </div>
            <div class="content">
                <span class="item-type">Melee Weapon</span>
                <h2>Scurvy Blade</h2>
                <div class="stats-box">
                    DMG: 95 | SPD: FAST | CRIT: 20%
                </div>
                <a href="#" class="btn">EQUIP ITEM</a>
            </div>
        </article>

        <article class="loot-card">
            <span class="rarity-tag purple-tag">EPIC</span>
            <div class="image-wrapper">
                <img src="https://i.pinimg.com/736x/06/b7/3f/06b73f2cf5509640c77e44c04ecaddb5.jpg" alt="Magic Potion">
            </div>
            <div class="content">
                <span class="item-type">Consumable</span>
                <h2>Shock Juice</h2>
                <div class="stats-box">
                    HEAL: +50 | SHIELD: +50
                </div>
                <a href="#" class="btn" style="background: var(--secondary);">DRINK UP!</a>
            </div>
        </article>

        <article class="loot-card">
            <span class="rarity-tag blue-tag">RARE</span>
            <div class="image-wrapper">
                <img src="https://images.unsplash.com/photo-1542751371-adc38448a05e?q=80&w=500&auto=format&fit=crop" alt="Gaming Gear">
            </div>
            <div class="content">
                <span class="item-type">Gadget</span>
                <h2>Cyber Deck</h2>
                <div class="stats-box">
                    HACK: 100% | RANGE: 50m
                </div>
                <a href="#" class="btn" style="background: var(--accent); color: white;">INITIALIZE</a>
            </div>
        </article>
    </main>

    <footer>
        <p>RELOAD TO REFRESH LOOT DROPS</p>
    </footer>

    <script>
        document.getElementById('backBtn').addEventListener('click', function(e) {
            e.preventDefault(); 
            window.history.back(); 
        });
    </script>

</body>
</html>
