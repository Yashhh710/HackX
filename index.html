        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@900&family=Orbitron:wght@400;700&display=swap');

        :root {
            --manga-black: #111;
            --manga-white: #fff;
            --manga-cyan: #06b6d4;
            --white: #ffffff;
        }

        body, html { 
            margin: 0; padding: 0; height: 100%; overflow: hidden; 
            font-family: 'Inter', ui-sans-serif, system-ui, sans-serif;
        }

        /* --- HUD ALIGNMENT SYSTEM --- */
        .hud-width {
            width: 280px; /* Locked shared width for both bars */
        }

        .manga-panel {
            background: var(--manga-black);
            border: 3px solid #000;
            box-shadow: 6px 6px 0px rgba(0,0,0,0.2);
            clip-path: polygon(0% 0%, 95% 0%, 100% 50%, 95% 100%, 0% 100%);
        }

        .manga-avatar {
            border: 3px solid #000;
            background: #fff;
            box-shadow: 4px 4px 0px rgba(0,0,0,0.2);
        }

        .level-square {
            width: 52px;
            height: 52px;
            background: var(--panel-purple);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.4);
        }

        .manga-xp {
            background: #333;
            height: 24px;
            border-left: 3px solid #000;
            border-right: 3px solid #000;
            position: relative;
        }

        #progress-fill {
            height: 100%;
            background: var(--manga-cyan);
            border-right: 3px solid #000;
            transition: width 1.5s cubic-bezier(0.19, 1, 0.22, 1);
        }

        @keyframes moveGradient {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* --- TRANSITION --- */
        #main-bg { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background-image: url('../models/img/1.jpeg'); 
            background-size: cover; 
            background-position: center; 
            z-index: -1; 
            transform: scale(1.15);
            animation: bgZoom 30s infinite alternate ease-in-out;
        }
        @keyframes bgZoom {
            from { transform: scale(1.15); }
            to { transform: scale(1.25); }
        }
        .clickable-ui { opacity: 0; transform: translateY(-30px); filter: blur(10px); }
    </style>
</head>

    <script>
        const loaderOverlay = document.getElementById('loader-overlay');
        const loaderFill = document.getElementById('loader-fill');
        const loaderCard = document.getElementById('card');
        const birthInput = document.getElementById('birthdate-input');
        const layer1 = document.getElementById('wave-layer-1');
        const layer2 = document.getElementById('wave-layer-2');
        const layer3 = document.getElementById('wave-layer-3');

        function updateAge() {
            const birthDate = new Date(birthInput.value);
            const now = new Date();
            const diffTime = Math.abs(now - birthDate);
            const totalDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
            let currentAge = now.getFullYear() - birthDate.getFullYear();
            let lastBirthday = new Date(now.getFullYear(), birthDate.getMonth(), birthDate.getDate());
            if (now < lastBirthday) {
                currentAge--;
                lastBirthday = new Date(now.getFullYear() - 1, birthDate.getMonth(), birthDate.getDate());
            }
            let nextBirthday = new Date(lastBirthday.getFullYear() + 1, birthDate.getMonth(), birthDate.getDate());
            const totalYearMs = nextBirthday - lastBirthday;
            const elapsedMs = now - lastBirthday;
            const progressPercent = Math.min((elapsedMs / totalYearMs) * 100, 100);
            if (document.getElementById('display-age-years-manga')) document.getElementById('display-age-years-manga').innerText = currentAge;
            if (document.getElementById('level-percentage')) document.getElementById('level-percentage').innerText = Math.floor(progressPercent);
            if (document.getElementById('xp-text')) document.getElementById('xp-text').innerText = `${totalDays.toLocaleString()} DAYS EVOLVED`;
            document.getElementById('progress-fill').style.width = progressPercent + "%";
        }

        function triggerLiquidWave(targetUrl) {
            const tl = gsap.timeline();
            const branding = document.getElementById('transition-branding');
            const text = document.getElementById('transition-text');
            const centerCharacter = document.getElementById('center-character');
            const characterContainer = document.getElementById('character-container');
            
            // Elevate character so it's ON TOP of the liquid wave
            if (characterContainer) {
                characterContainer.style.zIndex = '10005';
            }
            
            // Smooth transformation to 2.png
            if (centerCharacter) {
                gsap.to(centerCharacter, {
                    opacity: 0,
                    scale: 0.8,
                    filter: "blur(10px) brightness(2)",
                    duration: 0.2,
                    onComplete: () => {
                        centerCharacter.src = '../models/img/2.png';
                        gsap.to(centerCharacter, {
                            opacity: 1,
                            scale: 1.15,
                            filter: "blur(0px) brightness(1)",
                            duration: 0.5,
                            ease: "expo.out"
                        });
                    }
                });
            }
            
            // RESET
            tl.set([layer1, layer2, layer3], { attr: { d: "M 0 100 V 100 Q 50 100 100 100 V 100 z" } });
            tl.set(branding, { opacity: 0, scale: 0.5, filter: "blur(20px)" });
            tl.set(text, { y: 100, opacity: 0 });
            
            // WAVE UP (More dramatic organic curves)
            tl.to(layer3, { duration: 0.8, attr: { d: "M 0 100 V 20 Q 50 -40 100 20 V 100 z" }, ease: "power3.in" }, 0);
            tl.to(layer2, { duration: 0.9, attr: { d: "M 0 100 V 30 Q 50 -30 100 30 V 100 z" }, ease: "power3.inOut" }, 0.05);
            tl.to(layer1, { duration: 1, attr: { d: "M 0 100 V 40 Q 50 -20 100 40 V 100 z" }, ease: "power3.inOut" }, 0.1);
            
            // DRAMATIC BRANDING REVEAL
            tl.to(branding, { opacity: 1, scale: 1, filter: "blur(0px)", duration: 0.8, ease: "back.out(1.2)" }, 0.4);
            tl.to(text, { y: 0, opacity: 1, duration: 0.7, ease: "expo.out" }, 0.6);

            // MASSIVE FILL FINISH
            tl.to([layer1, layer2, layer3], { 
                duration: 0.8, 
                attr: { d: "M 0 100 V 0 Q 50 0 100 0 V 100 z" }, 
                ease: "expo.in", 
                stagger: 0.08,
                onComplete: () => { window.location.href = targetUrl; } 
            }, "+=0.2");

            // IMPACTFUL EXIT
            tl.to(branding, { scale: 1.5, opacity: 0, duration: 0.6, ease: "power3.in" }, "-=0.4");
        }

        document.querySelectorAll('.nav-link').forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault();
                triggerLiquidWave(link.getAttribute('href'));
            });
        });

        // --- BOOT REDIRECT (FIXED FOR NAVIGATION) ---
        // Only trigger loader if it's a hard refresh
        const navEntries = window.performance.getEntriesByType("navigation");
        if (navEntries.length > 0 && navEntries[0].type === "reload") {
            sessionStorage.removeItem('system_booted');
        }

        if (!sessionStorage.getItem('system_booted')) {
            window.location.href = 'Loading.html';
        }

        window.addEventListener('DOMContentLoaded', () => {
            updateAge();
            const layer1 = document.getElementById('wave-layer-1');
            const layer2 = document.getElementById('wave-layer-2');
            const layer3 = document.getElementById('wave-layer-3');
            
            const tl = gsap.timeline();
            
            // REVEAL WAVE DOWNWARDS (When arriving from loading or about page)
            tl.to(layer1, { duration: 0.8, attr: { d: "M 0 100 V 100 Q 50 100 100 100 V 100 z" }, ease: "power3.inOut" }, 0.1);
            tl.to(layer2, { duration: 0.9, attr: { d: "M 0 100 V 100 Q 50 100 100 100 V 100 z" }, ease: "power3.inOut" }, 0.2);
            tl.to(layer3, { duration: 1, attr: { d: "M 0 100 V 100 Q 50 100 100 100 V 100 z" }, ease: "power3.inOut" }, 0.3);

            // Animate UI elements in
            tl.to(".clickable-ui", { opacity: 1, y: 0, filter: "blur(0px)", stagger: 0.1, duration: 1, ease: "expo.out" }, 0.5);
        });

        // --- MOUSE PARALLAX ANIMATION ---
        window.addEventListener('mousemove', (e) => {
            const { clientX, clientY } = e;
            const xPos = (clientX / window.innerWidth - 0.5) * 8; // Small shift
            const yPos = (clientY / window.innerHeight - 0.5) * 4;  // Very small shift
            const rotY = (clientX / window.innerWidth - 0.5) * 3;   // Subtle tilt
            const rotX = (clientY / window.innerHeight - 0.5) * -2; // Subtle tilt

            gsap.to("#character-container", {
                duration: 3.5, // Ultra slow and smooth
                x: xPos,
                y: yPos,
                rotationY: rotY,
                rotationX: rotX,
                ease: "power1.out",
                overwrite: "auto"
            });

            // --- Background Parallax (Moves in strong opposite direction) ---
            gsap.to("#bg-container", {
                duration: 4.5, // Ultra slow for background
                x: -xPos * 1.5, 
                y: -yPos * 1.5,
                ease: "power2.out",
                overwrite: "auto"
            });
        });

        birthInput.addEventListener('change', updateAge);
        setInterval(updateAge, 60000);

        const btn = document.getElementById('settingsBtn');
        const menu = document.getElementById('sideMenu');
        let menuOpen = false;
        btn.onclick = () => {
            gsap.to(menu, { x: menuOpen ? "100%" : 0, duration: 0.6, ease: "expo.out" });
            gsap.to(btn, { rotation: menuOpen ? 0 : 180, duration: 0.6 });
            menuOpen = !menuOpen;
        };

        // mini game
const miniBtn = document.getElementById("miniBtn");
const miniInner = document.getElementById("btnInner");

miniBtn.addEventListener("click", () => {
    // press animation
    miniInner.style.transform = "translateY(5px)";

    // small delay for effect
    setTimeout(() => {
        window.location.href = "../files/minigames/mini.html";

vaultBtn.addEventListener("click", () => {

    vaultInner.style.transform = "translateY(5px)";

    // 2. Small delay to let the user feel the click
    setTimeout(() => {

        window.location.href = '../files/Vault/Vault.html';
        
        // Optional: Reset position after 300ms so it's ready if they come back
        setTimeout(() => {
            vaultInner.style.transform = "translateY(0px)";
            vaultInner.style.boxShadow = "0 5px 0 #0a0a0a";

const storeInner = document.getElementById("storeInner");

storeBtn.addEventListener("click", () => {

    storeInner.style.transform = "translateY(5px)";
    storeInner.style.boxShadow = "0 0 0 #0a0a0a";

    // 2. Trigger your liquid wave transition to the store file
    // Adjusted path to match your folder structure (assuming it's in files/store/)
