<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYSTEM // VAULT // Hero Selector</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Rajdhani:wght@600;700;900&display=swap');

        :root {
            --ui-blue: #1e293b;
            --ui-blue-selected: #3b82f6;
            --ui-gold: #f59e0b;
            --ui-cyan: #00f2ff;
            --border: rgba(255,255,255,0.1);
            --bg: #030712;
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Rajdhani', sans-serif; /* Techno font for UI */
            overflow: hidden;
            height: 100vh;
            /* Background pattern like the reference */
            background-image: repeating-linear-gradient(-45deg, rgba(255,255,255,0.01) 0px, rgba(255,255,255,0.01) 1px, transparent 1px, transparent 10px);
        }

        /* --- THE EXACT SLANTED HEADER TABS --- */
        .header-tabs {
            display: flex;
            gap: 10px;
            padding: 20px 60px;
            background: rgba(0,0,0,0.5);
        }

        .tab-slant {
            padding: 8px 30px;
            background: #1e293b;
            clip-path: polygon(15% 0, 100% 0, 85% 100%, 0 100%);
            font-weight: 900;
            font-size: 14px;
            color: #64748b;
            cursor: pointer;
            transition: 0.3s;
        }

        .tab-slant.active {
            background: var(--ui-gold);
            color: black;
            transform: scale(1.1);
        }

        /* --- MAIN CONTENT LAYOUT --- */
        .vault-frame {
            display: grid;
            grid-template-columns: 1fr 400px;
            height: calc(100vh - 100px);
            padding: 0 60px;
            gap: 40px;
        }

        /* --- CHARACTER GRID --- */
        .grid-scroll {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 15px;
            overflow-y: auto;
            padding-right: 15px;
            align-content: start;
        }

        /* The severe slanted trapezoid card from the image */
        .char-card-pro {
            position: relative;
            aspect-ratio: 0.7;
            background: rgba(255,255,255,0.03);
            border: 2px solid var(--border);
            overflow: hidden;
            cursor: pointer;
            transition: 0.3s;
            clip-path: polygon(10% 0, 100% 0, 100% 90%, 90% 100%, 0 100%);
        }

        .char-card-pro:hover {
            border-color: var(--ui-cyan);
            background: rgba(0, 242, 255, 0.1);
            transform: translateY(-5px);
        }

        .char-card-pro.selected {
            border: 4px solid var(--ui-gold);
            outline: 6px solid var(--ui-gold);
            outline-offset: 4px;
        }

        .char-card-pro img {
            width: 100%; height: 100%; object-fit: cover;
            filter: grayscale(1);
            transition: 0.3s;
        }

        .char-card-pro.selected img, .char-card-pro:hover img {
            filter: grayscale(0);
        }

        /* --- Name Tag with the cyan/yellow tint --- */
        .char-tag {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            background: rgba(0,0,0,0.8);
            border-top: 2px solid rgba(255,255,255,0.1);
            color: white;
            text-align: center;
            font-size: 10px;
            padding: 6px 0;
            font-weight: 900;
            text-transform: uppercase;
        }

        .char-card-pro.selected .char-tag {
            background: var(--ui-gold);
            color: black;
        }

        /* --- PREVIEW PANEL --- */
        .right-panel {
            border-left: 2px solid var(--border);
            padding-left: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: rgba(255,255,255,0.01);
        }

        .hero-title-group {
            text-align: center;
            margin-bottom: 20px;
        }

        .h-name-huge {
            font-size: 40px;
            font-weight: 900;
            color: var(--ui-gold);
            text-transform: uppercase;
            font-style: italic;
            letter-spacing: -2px;
        }

        .mastery-info {
            display: flex;
            gap: 15px;
            color: #06b6d4;
            font-weight: 900;
            font-size: 11px;
        }

        /* --- UNLOCK STATS --- */
        .stat-block {
            width: 100%;
            background: rgba(0,0,0,0.5);
            border-left: 4px solid var(--ui-cyan);
            padding: 15px;
            margin-bottom: 15px;
        }

        .stat-block-alt { border-color: var(--ui-gold); }

        .stat-block .label { font-size: 10px; text-transform: uppercase; color: #64748b; font-weight: 700; }
        .stat-block .value { font-size: 18px; font-weight: 900; color: white; }

        /* --- EXIT UI --- */
        .back-btn-trap {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: white;
            color: black;
            font-weight: 900;
            padding: 10px 40px;
            clip-path: polygon(15% 0, 100% 0, 85% 100%, 0 100%);
            font-size: 12px;
            transition: 0.2s;
            cursor: pointer;
        }

        .back-btn-trap:hover {
            background: var(--ui-gold);
            transform: scale(1.05);
        }

        /* --- AUDIO FEEDBACK & GLITCH VFX (Via JavaScript) --- */
    </style>
</head>
<body>

    <header class="header-tabs">
        <div class="absolute top-4 left-6 text-xs text-zinc-600 font-bold tracking-widest uppercase">system_boot_02</div>
        <div class="tab-slant active">BATTLEBORN</div>
        <div class="tab-slant">GEAR</div>
        <div class="tab-slant">CAREER</div>
        <div class="tab-slant">MARKETPLACE</div>
        <div class="absolute top-4 right-16 flex gap-4 text-xs"><span>0</span><span>bebop38</span></div>
    </header>

    <div class="vault-container vault-frame mt-10">
        
        <div class="grid-scroll">
            
            <div class="char-card-pro selected" onclick="selectHero('YASH', 'LV. 17', '../models/img/me.png')">
                <img src="https://avatars.githubusercontent.com/u/233944797?v=4" alt="Yash">
                <div class="char-tag">YASH TAMBADE</div>
            </div>

            <script>
                const lockedHeroes = ['Locked', 'Locked', 'Locked', 'Locked', 'Locked', 'Locked', 'Locked', 'Locked', 'Locked', 'Locked', 'Locked'];
                const grid = document.querySelector('.grid-scroll');
                lockedHeroes.forEach(hero => {
                    grid.innerHTML += `
                        <div class="char-card-pro opacity-40">
                            <div class="absolute inset-0 flex items-center justify-center">
                                <span class="text-3xl text-zinc-600">🔒</span>
                            </div>
                            <div class="char-tag">${hero}</div>
                        </div>
                    `;
                });
            </script>
        </div>

        <div class="right-panel">
            <div class="hero-title-group">
                <div class="text-xs text-zinc-500 font-bold">SELECTED OPERATIVE</div>
                <h1 id="hero-name-huge" class="h-name-huge">YASH</h1>
                <div class="mastery-info mt-2">
                    <span>Rank: Lv.<span id="hero-lvl-alt">17</span></span>
                    <span>Progression: 83%</span>
                </div>
            </div>

            <div class="relative flex-grow flex items-center justify-center">
                <div class="absolute w-64 h-64 bg-yellow-400/5 blur-[120px] rounded-full"></div>
                <img id="hero-img-huge" src="../models/img/me.png" class="max-h-full h-auto drop-shadow-[0_20px_50px_rgba(0,0,0,1)] relative z-10">
            </div>

            <div class="stat-container-frame w-full mt-auto mb-16">
                <div class="stat-block">
                    <div class="label">CURRENT ASSIGNMENT</div>
                    <div class="value">FrontEnd Architect v2.0</div>
                </div>
                <div class="stat-block stat-block-alt">
                    <div class="label">STATUS</div>
                    <div class="value">ACTIVE_DEPLOYMENT</div>
                </div>
            </div>
        </div>
    </div>

    <div class="back-btn-trap" onclick="window.history.back()">ESC BACK</div>
    <div class="fixed bottom-8 left-16 flex gap-8 text-xs text-zinc-600 font-bold uppercase tracking-widest">
        <span>A / D Spin</span>
        <span>Enter Select</span>
        <span>Q Select Sort</span>
    </div>

    <script>
        function selectHero(name, lvl, img) {
            // Animate changes for that "Pro" feel
            gsap.to("#hero-img-huge", { opacity: 0, scale: 0.9, duration: 0.2, onComplete: () => {
                document.getElementById('hero-name-huge').innerText = name;
                document.getElementById('hero-img-huge').src = img;
                // document.getElementById('hero-lvl-alt').innerText = lvl; // Already matching reference
                gsap.to("#hero-img-huge", { opacity: 1, scale: 1, duration: 0.4, ease: "back.out(1.7)" });
            }});
        }
    </script>
</body>
</html>
