<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creative Blocky Menu</title>
    <style>
        :root {
            --bg: #fdedad;
            --white: #ffffff;
            --shadow: rgba(0, 0, 0, 0.2);
            /* Gradients */
            --green: linear-gradient(180deg, #37e9b4, #22b38a);
            --lime:  linear-gradient(180deg, #a4e532, #76bc21);
            --orange: linear-gradient(180deg, #ffda3b, #f9a41c);
            --blue:   linear-gradient(180deg, #6ecbff, #4a8dfd);
        }

        body {
            background-color: var(--bg);
            font-family: 'Arial Black', "Microsoft YaHei", sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            perspective: 1000px;
        }

        .menu-wrapper {
            display: grid;
            grid-template-columns: 300px 220px 220px;
            grid-template-rows: 150px 150px;
            gap: 25px;
            padding: 40px;
        }

        .card {
            position: relative;
            background: white;
            border: 6px solid var(--white);
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 0px var(--shadow);
            overflow: visible;
            text-decoration: none; 
            display: block;        
            color: inherit;        
            -webkit-tap-highlight-color: transparent; /* Clean click on mobile */
        }

        .inner {
            position: absolute;
            inset: 0;
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 15px;
        }

        .inner::before {
            content: "";
            position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background-image: 
                linear-gradient(45deg, rgba(255,255,255,0.15) 25%, transparent 25%, transparent 75%, rgba(255,255,255,0.15) 75%);
            background-size: 40px 40px;
            animation: patternMove 10s linear infinite;
        }

        @keyframes patternMove {
            from { transform: translate(0, 0); }
            to { transform: translate(40px, 40px); }
        }

        .char {
            position: absolute;
            z-index: 10;
            filter: drop-shadow(0 10px 5px rgba(0,0,0,0.2));
            transition: all 0.4s ease;
            pointer-events: none;
        }

        .char img {
            height: 120px;
            width: auto;
            display: block;
        }

        .c1 { grid-area: 1 / 1 / 2 / 2; transform: rotate(-2deg); }
        .c2 { grid-area: 2 / 1 / 3 / 2; transform: rotate(-1deg); }
        .c3 { grid-area: 1 / 2 / 3 / 3; transform: rotate(1deg); }
        .c4 { grid-area: 1 / 3 / 3 / 4; transform: rotate(3deg); }

        .c1 .char { top: -50px; right: 10px; }
        .c2 .char { top: -40px; right: 20px; }
        .c3 .char { top: 15%; left: 50%; transform: translateX(-50%); }
        .c4 .char { top: 20%; left: 50%; transform: translateX(-50%); }

        .label {
            position: relative;
            z-index: 5;
            color: white;
            text-shadow: 2px 2px 0px rgba(0,0,0,0.3);
            font-style: italic;
        }

        .title { font-size: 2.8rem; display: block; line-height: 0.9; }
        .subtitle { font-size: 1.2rem; display: block; text-align: right; opacity: 0.9; }

        .card:hover {
            transform: scale(1.05) translateY(-10px) rotate(0deg) !important;
            z-index: 20;
            box-shadow: 0 20px 0px rgba(0,0,0,0.1);
        }

        .card:hover .char {
            transform: scale(1.2) translateY(-15px);
            filter: drop-shadow(0 20px 10px rgba(0,0,0,0.3));
        }

        .card:active {
            transform: scale(0.98) translateY(5px) !important;
            box-shadow: 0 4px 0px var(--shadow);
            transition: 0.1s;
        }

        .footer {
            position: absolute;
            bottom: 40px;
            color: #9d7d3d;
            font-weight: bold;
            font-size: 1.1rem;
            border-left: 5px solid #ffda3b;
            padding-left: 15px;
        }
    </style>
</head>
<body>

    <div class="menu-wrapper">
        <a href="reaction-game.html" target="_blank" rel="noopener noreferrer" class="card c1">
            <div class="char"><img src="https://cdn-icons-png.flaticon.com/512/744/744465.png"></div>
            <div class="inner" style="background: var(--green);">
                <div class="label">
                    <span class="title">🏎️</span>
                    <span class="subtitle">Reaction Speed Test</span>
                </div>
            </div>
        </a>

        <a href="memory-game.html" target="_blank" rel="noopener noreferrer" class="card c2">
            <div class="char"><img src="https://cdn-icons-png.flaticon.com/512/2618/2618210.png"></div>
            <div class="inner" style="background: var(--lime);">
                <div class="label">
                    <span class="title">♣️</span>
                    <span class="subtitle">Memory Flip Game</span>
                </div>
            </div>
        </a>

        <a href="guessing-game.html" target="_blank" rel="noopener noreferrer" class="card c3">
            <div class="char"><img src="https://cdn-icons-png.flaticon.com/512/4222/4222031.png"></div>
            <div class="inner" style="background: var(--orange);">
                <div class="label">
                    <span class="title">🤔</span>
                    <span class="subtitle">Number Guessing Game</span>
                </div>
            </div>
        </a>

        <a href="https://yashhh710.github.io/tic-tac-toe-html-css/index.html" target="_blank" rel="noopener noreferrer" class="card c4">
            <div class="char"><img src="https://cdn-icons-png.flaticon.com/512/566/566312.png"></div>
            <div class="inner" style="background: var(--blue);">
                <div class="label">
                    <span class="title">🅾️❎</span>
                    <span class="subtitle">Tic Tac Toe</span>
                </div>
            </div>
        </a>
    </div>

</body>
</html>
